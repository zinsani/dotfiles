# ── Prefix ────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── Reload ────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ── Window / 기타 ─────────────────────────────────────────
bind a last-window
bind . command-prompt
bind space command-prompt -p index "select-window"
bind Q confirm kill-server
# kill-window 는 기본키 prefix & 사용 (k 는 pane 이동에 할당)

# ── Splits: | 수평, - 수직 (현재 경로 유지), 새 창도 현재 경로 ─
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane 이동: prefix + hjkl ───────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane 크기조절: prefix + HJKL (연속 입력 가능) ──────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vi): v 선택, y 복사 ────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Options ───────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g bell-action none
set -g set-titles on
set -g set-titles-string "#W:#T"
setw -g automatic-rename on
setw -g monitor-activity on

# ── Truecolor / TERM (ghostty + nvim) ─────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -s escape-time 0          # nvim 이동 지연 제거 (lazyvim 필수)
set -g focus-events on        # nvim autoread 등

# ── Plugins (TPM) ─────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @shell_mode 'vi'

# 세션 저장/복구 (continuum 이 resurrect 를 자동화: 15분마다 저장 + 시작 시 복원)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# nvim ↔ tmux 이동 (C-h/j/k/l). nvim 쪽에도 동일 플러그인 필요 (아래 안내).
set -g @plugin 'christoomey/vim-tmux-navigator'

# 테마 (catppuccin 이 상태줄 관리 — status-left/right 를 직접 덮지 않음)
set -g @plugin 'catppuccin/tmux#v1.0.2'
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_current_background "rounded"
# 상태줄에 pane title(#T) 대신 윈도우 이름(#W)을 표시.
# (#T 는 프로그램이 넣는 값이라 Claude Code 스피너 점자·셸 경로 등이 그대로 노출됨)
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
